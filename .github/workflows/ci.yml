name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v5
        with:
          name: production-build
          path: .output
          include-hidden-files: true
          retention-days: 1

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage
          retention-days: 14

  e2e:
    name: E2E and accessibility
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production build
        uses: actions/download-artifact@v6
        with:
          name: production-build
          path: .output

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E and accessibility tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14

  lighthouse:
    name: Lighthouse
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production build
        uses: actions/download-artifact@v6
        with:
          name: production-build
          path: .output

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Configure Chromium for Lighthouse
        run: |
          node --input-type=module -e "import { chromium } from 'playwright'; console.log('CHROME_PATH=' + chromium.executablePath())" >> "$GITHUB_ENV"

      - name: Run Lighthouse CI
        run: npm run test:lighthouse

      - name: Upload Lighthouse reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-reports
          path: .lighthouseci
          include-hidden-files: true
          retention-days: 14
