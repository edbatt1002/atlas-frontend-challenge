services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      default:
        # Avoid Chromium's HTTPS upgrade for the single-label hostname "app".
        aliases:
          - app.local

  e2e:
    profiles: ["e2e"]
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app
    volumes:
      - .:/app
      - e2e_node_modules:/app/node_modules
      - e2e_nuxt:/app/.nuxt
      - npm_cache:/root/.npm
    environment:
      CI: "true"
      HUSKY: "0"
      PLAYWRIGHT_BASE_URL: http://app.local:3000
    depends_on:
      app:
        condition: service_healthy
    command: sh -c "npm ci && npm run test:e2e"

volumes:
  e2e_node_modules:
  e2e_nuxt:
  npm_cache:
